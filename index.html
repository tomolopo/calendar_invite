<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Invite - FBN CX Workshop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        
        .event-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .event-details {
            background: #f7f7f7;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        
        .event-details h2 {
            color: #667eea;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }
        
        .detail-item {
            margin: 10px 0;
            display: flex;
            align-items: start;
            gap: 10px;
        }
        
        .detail-icon {
            font-size: 1.2rem;
            margin-top: 2px;
        }
        
        .detail-text {
            flex: 1;
            color: #555;
            line-height: 1.6;
        }
        
        .detail-text strong {
            color: #333;
            display: block;
            margin-bottom: 5px;
        }
        
        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .footer {
            margin-top: 30px;
            color: #888;
            font-size: 0.9rem;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }
            
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="event-icon">📅</div>
        <h1>You're Invited!</h1>
        
        <div class="event-details">
            <h2>Exclusive Workshop For FBN CX</h2>
            
            <div class="detail-item">
                <div class="detail-icon">📍</div>
                <div class="detail-text">
                    <strong>Location</strong>
                    Wheatbaker Hotel
                </div>
            </div>
            
            <div class="detail-item">
                <div class="detail-icon">📆</div>
                <div class="detail-text">
                    <strong>Date</strong>
                    March 27th, 2026
                </div>
            </div>
            
            <div class="detail-item">
                <div class="detail-icon">👥</div>
                <div class="detail-text">
                    <strong>Attendees</strong>
                    Daisy Kupoluyi, Olatayo L-Ajai, Taiwo Omolopo, Isaac Akanni
                </div>
            </div>
        </div>
        
        <a href="/public/Exclusive_Workshop_For_FBN_CX_Workshop_March_27th_Wheatbaker_Hotel.ics" download class="download-btn">
            Download Calendar Invite
        </a>
        
        <div class="footer">
            Click the button above to add this event to your calendar
        </div>
    </div>
    
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
